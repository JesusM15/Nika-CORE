# /etc/mosquitto/mosquitto.conf
# ══════════════════════════════════════════════════
# Mosquitto MQTT Broker — Configuración para Nika OS
# Raspberry Pi (Raspbian/Raspberry Pi OS)
# ══════════════════════════════════════════════════
#
# Instalación:
#   sudo apt install mosquitto mosquitto-clients
#   sudo cp mosquitto.conf /etc/mosquitto/mosquitto.conf
#   sudo systemctl restart mosquitto
#
# Verificar:
#   sudo systemctl status mosquitto
#   mosquitto_sub -t "nika/#" -v
# ══════════════════════════════════════════════════

# ── Puerto de escucha ────────────────────────────
# 1883 = MQTT estándar (sin TLS)
# Para acceso desde la red local, escuchar en todas las interfaces
listener 1883 0.0.0.0

# ── Autenticación ────────────────────────────────
# Para red doméstica: sin autenticación (más simple)
allow_anonymous true

# Para producción con autenticación:
# allow_anonymous false
# password_file /etc/mosquitto/passwd
# (generar con: mosquitto_passwd -c /etc/mosquitto/passwd nika)

# ── Persistencia ─────────────────────────────────
# Guardar mensajes retain y suscripciones en disco
# para sobrevivir reinicios del broker.
persistence true
persistence_location /var/lib/mosquitto/

# ── Logging ──────────────────────────────────────
log_dest file /var/log/mosquitto/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
# Descomentar para debug:
# log_type debug

# ── Keep-alive y timeouts ────────────────────────
# Tiempo máximo (segundos) sin recibir PINGREQ antes de desconectar al cliente
# El keep-alive de los clientes Nika es 60 segundos.
# Este valor debe ser > keep-alive del cliente.
# (Mosquitto lo gestiona automáticamente por el valor del cliente)

# ── Límites ──────────────────────────────────────
# Máximo número de mensajes en cola por cliente
max_queued_messages 1000

# Tamaño máximo de payload (bytes). 0 = sin límite.
# Los payloads de Nika son pequeños JSON (<4KB)
message_size_limit 0

# ── WebSocket (opcional) ─────────────────────────
# Habilitar si quieres conectar clientes MQTT.js desde el navegador:
# listener 9001
# protocol websockets
